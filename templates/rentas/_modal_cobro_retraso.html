<div class="modal fade" id="modalCobroRetraso" tabindex="-1" aria-labelledby="modalCobroRetrasoLabel" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-xl">
        <form id="form-cobro-retraso">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalCobroRetrasoLabel">
                        <i class="bi bi-clock-history me-2"></i>Cobro por Retraso en Devolución
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-3 align-items-stretch">
                        <!-- Columna Izquierda - Detalle de Productos -->
                        <div class="col-md-6">
                            <div class="card h-100">
                                <div class="card-header text-center">
                                    <h6 class="mb-0">
                                        <i class="bi bi-list-check me-2"></i>Detalle de Productos con Retraso
                                    </h6>
                                </div>
                                <div class="card-body">
                                    <div class="alert alert-warning mb-3">
                                        <strong>El cliente devolvió el equipo <span id="dias-retraso"></span> días después de la fecha límite.</strong>
                                    </div>
                                    <div class="table-responsive mb-3" style="max-height: 300px; overflow-y: auto;">
                                        <table class="table table-bordered table-sm" id="tabla-cobro-retraso">
                                            <thead class="table-dark sticky-top">
                                                <tr>
                                                    <th style="font-size: 0.8rem;">Producto</th>
                                                    <th style="font-size: 0.8rem;">Cant.</th>
                                                    <th style="font-size: 0.8rem;">Precio orig.</th>
                                                    <th style="font-size: 0.8rem;">Días ret.</th>
                                                    <th style="font-size: 0.8rem;">Subtotal</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <!-- Se llena dinámicamente con JS -->
                                            </tbody>
                                        </table>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">¿Requiere traslado extra?</label>
                                        <select class="form-select" id="cobro-retraso-traslado-extra" name="traslado_extra">
                                            <option value="ninguno">No requiere</option>
                                            <option value="extra">Sí, agregar traslado extra</option>
                                        </select>
                                    </div>
                                    <div class="mb-3" id="cobro-retraso-costo-traslado-group" style="display: none;">
                                        <label class="form-label">Costo de traslado extra</label>
                                        <input type="number" class="form-control" id="cobro-retraso-costo-traslado" name="costo_traslado_extra" min="0" step="0.01" placeholder="0.00">
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- Columna Derecha - Información de Cobro y Pago -->
                        <div class="col-md-6">
                            <div class="card h-100">
                                <div class="card-header text-center">
                                    <h6 class="mb-0">
                                        <i class="bi bi-cash-coin me-2"></i>Información de Cobro y Pago
                                    </h6>
                                </div>
                                <div class="card-body">
                                    <div class="mb-3">
                                        <div class="alert alert-info">
                                            <div class="row text-center">
                                                <div class="col-4">
                                                    <small>Subtotal</small><br>
                                                    <strong>$<span id="subtotal-cobro-retraso">0.00</span></strong>
                                                </div>
                                                <div class="col-4">
                                                    <small>IVA (16%)</small><br>
                                                    <strong>$<span id="iva-cobro-retraso">0.00</span></strong>
                                                </div>
                                                <div class="col-4">
                                                    <small class="text-danger">TOTAL</small><br>
                                                    <strong class="text-danger">$<span id="total-cobro-retraso-con-iva">0.00</span></strong>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label for="cobro-retraso-facturable" class="form-label">¿Requiere factura?</label>
                                        <select class="form-select" id="cobro-retraso-facturable" name="facturable">
                                            <option value="0">No</option>
                                            <option value="1">Sí</option>
                                        </select>
                                    </div>
                                    <div class="mb-3">
                                        <label for="cobro-retraso-metodo-pago" class="form-label">Método de pago</label>
                                        <select class="form-select" id="cobro-retraso-metodo-pago" name="metodo_pago" required>
                                            <option value="efectivo">Efectivo</option>
                                            <option value="transferencia">Transferencia</option>
                                            <option value="tarjeta_debito">Tarjeta Débito</option>
                                            <option value="tarjeta_credito">Tarjeta Crédito</option>
                                        </select>
                                    </div>
                                    <div class="mb-3" id="grupo-numero-seguimiento-retraso" style="display:none;">
                                        <label for="numero-seguimiento-retraso" class="form-label">Número de seguimiento</label>
                                        <input type="text" id="numero-seguimiento-retraso" name="numero_seguimiento" class="form-control" placeholder="Número de seguimiento del banco">
                                    </div>
                                    <div class="row mb-3">
                                        <div class="col-md-6">
                                            <label for="cobro-retraso-monto-recibido" class="form-label">Monto recibido</label>
                                            <input type="number" class="form-control" id="cobro-retraso-monto-recibido" name="monto_recibido" min="0" step="0.01" placeholder="0.00">
                                        </div>
                                        <div class="col-md-6">
                                            <label for="cobro-retraso-cambio" class="form-label">Cambio</label>
                                            <input type="number" class="form-control" id="cobro-retraso-cambio" name="cambio" min="0" step="0.01" readonly>
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label for="cobro-retraso-observaciones" class="form-label">Observaciones</label>
                                        <textarea class="form-control" id="cobro-retraso-observaciones" name="observaciones" rows="3" placeholder="Observaciones adicionales..."></textarea>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer modal-footer-azul">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check2-circle me-2"></i>Guardar y Generar PDF
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
