<div class="modal fade" id="modalNotaSalida" tabindex="-1" aria-labelledby="modalNotaSalidaLabel" aria-hidden="true"
    data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-lg">
        <form id="form-nota-salida" class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalNotaSalidaLabel">
                    <i class="bi bi-arrow-right-circle me-2"></i>Nota de Salida
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>
            <div class="modal-body">
                <div class="row g-3 align-items-stretch">
                    <!-- Columna Izquierda - Información de la Renta -->
                    <div class="col-md-6">
                        <div class="card h-100">
                            <div class="card-header text-center">
                                <h6 class="mb-0">
                                    <i class="bi bi-info-circle me-2"></i>Información de la Renta
                                </h6>
                            </div>
                            <div class="card-body">
                                <!-- Folio y fecha/hora -->
                                <div class="mb-3">
                                    <label class="form-label">Folio</label>
                                    <div class="fw-bold text-primary" id="nota-salida-folio">00000</div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Fecha y hora</label>
                                    <div class="fw-bold" id="nota-salida-fecha">--/--/---- --:--</div>
                                </div>
                                <!-- Cliente y contacto -->
                                <div class="mb-3">
                                    <label class="form-label">Cliente</label>
                                    <div class="fw-bold" id="nota-salida-cliente">---</div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Celular</label>
                                    <div class="fw-bold" id="nota-salida-celular">---</div>
                                </div>
                                <!-- Dirección de la obra -->
                                <div class="mb-3">
                                    <label class="form-label">Dirección de la obra</label>
                                    <div class="fw-bold" id="nota-salida-direccion">---</div>
                                </div>
                                <!-- Periodo de renta -->
                                <div class="mb-3">
                                    <label class="form-label">Periodo</label>
                                    <div class="fw-bold" id="nota-salida-periodo">--/--/---- a indefinido</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- Columna Derecha - Detalles de Entrega -->
                    <div class="col-md-6">
                        <div class="card h-100">
                            <div class="card-header text-center">
                                <h6 class="mb-0">
                                    <i class="bi bi-box-seam me-2"></i>Detalles de Entrega
                                </h6>
                            </div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <label for="nota-salida-referencia" class="form-label">Número de referencia</label>
                                    <input type="text" id="nota-salida-referencia" name="numero_referencia" class="form-control" placeholder="Ingrese número de referencia...">
                                </div>
                                <!-- Tabla de piezas a entregar -->
                                <div class="mb-3">
                                    <label class="form-label">Piezas a entregar</label>
                                    <div class="table-responsive" style="max-height: 200px; overflow-y: auto;">
                                        <table class="table table-bordered table-sm mb-0">
                                            <thead class="table-dark sticky-top">
                                                <tr>
                                                    <th>Pieza</th>
                                                    <th style="width: 100px;">Cantidad</th>
                                                </tr>
                                            </thead>
                                            <tbody id="nota-salida-piezas"></tbody>
                                        </table>
                                    </div>
                                </div>
                                <!-- Observaciones -->
                                <div class="mb-3">
                                    <label for="nota-salida-observaciones" class="form-label">Observaciones</label>
                                    <textarea id="nota-salida-observaciones" name="observaciones" class="form-control" rows="3" placeholder="Observaciones adicionales..."></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer modal-footer-azul">
                <button type="submit" class="btn btn-primary" id="btn-generar-nota-salida">
                    <i class="bi bi-check2-circle me-2"></i>Generar Nota de Salida
                </button>
            </div>
        </form>
    </div>
</div>
