<div class="modal fade" id="modalCobroExtra" tabindex="-1" aria-labelledby="modalCobroExtraLabel" aria-hidden="true"
    data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-xl">
        <form id="form-cobro-extra">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalCobroExtraLabel">
                        <i class="bi bi-cash-coin me-2"></i>Cobro Extra
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-3 align-items-stretch">
                        <!-- Columna Izquierda - Detalles de piezas afectadas -->
                        <div class="col-md-7">
                            <div class="card h-100">
                                <div class="card-header text-center">
                                    <h6 class="mb-0">
                                        <i class="bi bi-list-check me-2"></i>Detalles de Piezas Afectadas
                                    </h6>
                                </div>
                                <div class="card-body p-0">
                                    <div id="detalle-cobro-extra">
                                        <!-- Aquí se inyecta la tabla por JS -->
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- Columna Derecha - Cobro y Observaciones -->
                        <div class="col-md-5">
                            <div class="card h-100">
                                <div class="card-header text-center">
                                    <h6 class="mb-0">
                                        <i class="bi bi-cash-coin me-2"></i>Información de Cobro
                                    </h6>
                                </div>
                                <div class="card-body">
                                    <!-- Totales -->
                                    <div class="mb-3">
                                        <div class="alert alert-info">
                                            <div class="row text-center">
                                                <div class="col-4">
                                                    <small>Subtotal</small><br>
                                                    <strong>$<span id="subtotal-cobro-extra">0.00</span></strong>
                                                </div>
                                                <div class="col-4">
                                                    <small>IVA (16%)</small><br>
                                                    <strong>$<span id="iva-cobro-extra">0.00</span></strong>
                                                </div>
                                                <div class="col-4">
                                                    <small class="text-primary">TOTAL</small><br>
                                                    <strong class="text-primary">$<span id="total-cobro-extra-con-iva">0.00</span></strong>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <!-- Información de Pago -->
                                    <div class="mb-3">
                                        <label for="metodo-pago-extra" class="form-label">Método de pago</label>
                                        <select id="metodo-pago-extra" name="metodo_pago" class="form-select">
                                            <option value="efectivo">Efectivo</option>
                                            <option value="transferencia">Transferencia</option>
                                            <option value="tarjeta_debito">Tarjeta Débito</option>
                                            <option value="tarjeta_credito">Tarjeta Crédito</option>
                                        </select>
                                    </div>
                                    <div class="mb-3" id="grupo-numero-seguimiento" style="display:none;">
                                        <label for="numero-seguimiento-extra" class="form-label">Número de seguimiento</label>
                                        <input type="text" id="numero-seguimiento-extra" name="numero_seguimiento"
                                            class="form-control" placeholder="Número de seguimiento del banco">
                                    </div>
                                    <div class="mb-3">
                                        <label for="facturable-extra" class="form-label">¿Requiere facturación?</label>
                                        <select id="facturable-extra" name="facturable" class="form-select">
                                            <option value="0">No</option>
                                            <option value="1">Sí</option>
                                        </select>
                                    </div>
                                    <div class="mb-3">
                                        <label for="monto-recibido-extra" class="form-label">Monto recibido</label>
                                        <input type="number" id="monto-recibido-extra" name="monto_recibido"
                                            class="form-control" min="0" step="0.01" placeholder="0.00">
                                    </div>
                                    <div class="mb-3">
                                        <label for="cambio-extra" class="form-label">Cambio</label>
                                        <input type="number" id="cambio-extra" name="cambio" class="form-control"
                                            min="0" step="0.01" readonly placeholder="0.00">
                                    </div>
                                    
                                    <!-- Observaciones -->
                                    <div class="mb-3">
                                        <label for="observaciones-cobro-extra" class="form-label">Observaciones</label>
                                        <textarea id="observaciones-cobro-extra" name="observaciones" class="form-control"
                                            rows="3" placeholder="Observaciones adicionales..."></textarea>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer modal-footer-azul">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        <i class="bi bi-x-circle me-2"></i>Cancelar
                    </button>
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-check2-circle me-2"></i>Guardar Cobro Extra
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
