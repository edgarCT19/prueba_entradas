<!-- Modal para cancelar renta (solo una instancia global) -->
<div class="modal fade" id="modalCancelarRenta" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <form id="form-cancelar-renta">
        <div class="modal-header">
          <h5 class="modal-title">Cancelar renta</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label for="motivo-cancelacion" class="form-label">Motivo de cancelación</label>
            <textarea class="form-control" id="motivo-cancelacion" name="motivo_cancelacion" rows="2" required></textarea>
          </div>
          <div class="mb-3">
            <label for="monto-reembolso" class="form-label">Monto de reembolso</label>
            <input type="number" class="form-control" id="monto-reembolso" name="monto_reembolso" min="0" step="0.01" required>
          </div>
          <input type="hidden" id="renta-id-cancelar" name="renta_id">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
          <button type="submit" class="btn btn-danger" id="btnConfirmarCancelarRenta">Cancelar renta</button>
        </div>
      </form>
    </div>
  </div>
</div>
